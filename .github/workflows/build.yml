name: Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Verify and build APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Verify repository hygiene
        run: ./gradlew verifyRepositoryHygiene

      - name: Verify architecture
        run: ./gradlew verifyArchitecture

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Decode release keystore
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
            echo "KEYSTORE_FILE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
          else
            echo "KEYSTORE_BASE64 is not set; release APK will be unsigned."
          fi

      - name: Build release APK
        run: ./gradlew :app:assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Prepare APK artifacts
        shell: bash
        run: |
          VERSION_NAME="$(python3 -c 'import re, pathlib; text = pathlib.Path("app/build.gradle.kts").read_text(encoding="utf-8"); print(re.search(r"versionName\s*=\s*\"([^\"]+)\"", text).group(1))')"
          APP_NAME="Salt Player 歌词支持"
          DEBUG_APK="$(find app/build/outputs/apk/debug -maxdepth 1 -type f -name '*.apk' | sort | head -n 1)"
          RELEASE_APK="$(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' | sort | head -n 1)"

          test -n "$DEBUG_APK"
          test -n "$RELEASE_APK"

          mkdir -p dist/debug dist/release
          cp "$DEBUG_APK" "dist/debug/${APP_NAME}-v${VERSION_NAME}-debug.apk"
          cp "$RELEASE_APK" "dist/release/${APP_NAME}-v${VERSION_NAME}-release.apk"

          find dist -type f -name '*.apk' -print

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Salt Player 歌词支持-debug
          path: dist/debug/*.apk
          if-no-files-found: error

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: Salt Player 歌词支持-release
          path: dist/release/*.apk
          if-no-files-found: error
